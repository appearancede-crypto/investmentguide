<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signal Engine — Crypto Market Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{
    --bg:#0b0b0c; --panel:#141416; --panel2:#161619; --ink:#f2f0ea; --dim:#86857f;
    --line:rgba(255,255,255,.10); --grid:rgba(255,255,255,.022);
    --accent:#ff453a; --bull:#34c759; --bear:#ff453a; --warn:#ffd60a;
  }
  [data-theme="bone"]{
    --bg:#e8e4da; --panel:#efebe1; --panel2:#e3dfd4; --ink:#16140f; --dim:#7c7565;
    --line:rgba(0,0,0,.13); --grid:rgba(0,0,0,.03);
    --accent:#aa3a1f; --bull:#2f7d4f; --bear:#aa3a1f; --warn:#9a6b00;
  }
  [data-theme="blueprint"]{
    --bg:#0a121c; --panel:#101d2c; --panel2:#13212f; --ink:#dceaf5; --dim:#5f7c93;
    --line:rgba(150,190,230,.13); --grid:rgba(120,180,230,.04);
    --accent:#0a84ff; --bull:#37d39b; --bear:#ff5a4d; --warn:#ffd60a;
  }
  [data-theme="oxide"]{
    --bg:#110e0a; --panel:#1a1510; --panel2:#1d1812; --ink:#efe6d6; --dim:#897c68;
    --line:rgba(255,225,170,.12); --grid:rgba(255,220,160,.035);
    --accent:#ff9f0a; --bull:#6fcf5f; --bear:#ff6b3d; --warn:#ffd60a;
  }
  @keyframes ringpulse{0%{box-shadow:0 0 0 0 var(--accent)}70%{box-shadow:0 0 0 6px rgba(255,69,58,0)}100%{box-shadow:0 0 0 0 rgba(255,69,58,0)}}
  @keyframes coreglow{0%,100%{opacity:.7;transform:scale(.92)}50%{opacity:1;transform:scale(1)}}
  @keyframes drift{0%{transform:translate(-6%,-4%)}50%{transform:translate(6%,4%)}100%{transform:translate(-6%,-4%)}}
  input[type=range]{accent-color:var(--accent);height:2px;cursor:pointer}
  .row-hover:hover{background:var(--panel2)}
  body{background:var(--bg)}
</style>
</head>
<body>
<div id="root" data-theme="carbon" style="position:relative;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;font-variant-numeric:tabular-nums;overflow-x:hidden;-webkit-font-smoothing:antialiased">

  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7"><div style="position:absolute;top:-20%;left:50%;width:80vw;height:60vh;transform:translateX(-50%);background:radial-gradient(closest-side,var(--accent),transparent 72%);opacity:.06;filter:blur(40px);animation:drift 46s ease-in-out infinite"></div></div>
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:34px 34px"></div>

  <div style="position:fixed;top:14px;left:14px;width:13px;height:13px;border-top:1px solid var(--dim);border-left:1px solid var(--dim);opacity:.6;z-index:40;pointer-events:none"></div>
  <div style="position:fixed;top:14px;right:14px;width:13px;height:13px;border-top:1px solid var(--dim);border-right:1px solid var(--dim);opacity:.6;z-index:40;pointer-events:none"></div>
  <div style="position:fixed;bottom:14px;left:14px;width:13px;height:13px;border-bottom:1px solid var(--dim);border-left:1px solid var(--dim);opacity:.6;z-index:40;pointer-events:none"></div>
  <div style="position:fixed;bottom:14px;right:14px;width:13px;height:13px;border-bottom:1px solid var(--dim);border-right:1px solid var(--dim);opacity:.6;z-index:40;pointer-events:none"></div>

  <header style="position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:15px 40px;background:var(--bg);border-bottom:1px solid var(--line)">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="position:relative;width:30px;height:30px;border:1.5px solid var(--ink);display:grid;place-items:center;flex:none">
        <div style="width:12px;height:12px;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:coreglow 4s ease-in-out infinite"></div>
      </div>
      <div style="line-height:1">
        <div style="font-size:15px;font-weight:600;letter-spacing:.02em">SIGNAL ENGINE</div>
        <div style="font-size:10px;font-weight:500;letter-spacing:.18em;color:var(--dim);margin-top:4px">CRYPTO MARKET ANALYSIS</div>
      </div>
    </div>
    <nav id="nav" style="display:flex;align-items:stretch;gap:4px"></nav>
    <div style="display:flex;align-items:center;gap:18px">
      <button id="simpleBtn" style="background:none;border:1px solid var(--accent);color:var(--ink);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.14em;padding:6px 12px;cursor:pointer;white-space:nowrap">SIMPLE MODE ON</button>
      <div id="themeSwitch" style="display:flex;gap:6px"></div>
      <div style="text-align:right;line-height:1.3;white-space:nowrap">
        <div id="mktLine" style="font-size:11px;font-weight:600;letter-spacing:.06em">BINANCE · 1H</div>
        <div id="mktCount" style="font-size:10px;font-weight:500;letter-spacing:.14em;color:var(--dim)">10 MARKETS</div>
      </div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ringpulse 2.2s ease-out infinite;flex:none"></div>
    </div>
  </header>

  <div style="display:flex;align-items:center;gap:10px;padding:9px 40px;background:var(--panel);border-bottom:1px solid var(--line);font-size:11px;color:var(--dim);letter-spacing:.04em;flex-wrap:wrap">
    <span style="color:var(--accent);font-weight:600;letter-spacing:.14em">ANALYSIS ONLY</span>
    <span style="opacity:.4">·</span>
    <span>Never places an order · never connects to your account · shows its reasoning for every signal.</span>
    <span style="opacity:.4">·</span>
    <span style="font-weight:500">Not financial advice.</span>
  </div>

  <main id="main" style="position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:38px 40px 110px"></main>
</div>

<script>
window.__SIGNAL_DATA__ = /*__SIGNAL_DATA__*/;
(function(){
"use strict";
const DATA = window.__SIGNAL_DATA__;
const ROOT = document.getElementById('root');
const MAIN = document.getElementById('main');
const NAV = document.getElementById('nav');
const THRESH = DATA.thresholds;
const THEMES = ['carbon','bone','blueprint','oxide'];

let state = { view:'scanner', selected:(DATA.names[0]||null), rangeKey:'7D',
              theme: (DATA.theme||'carbon'), bt:{...DATA.backtestDefaults},
              discoverSort: (DATA.discover&&DATA.discover.sort)||'momentum',
              simple:true,
              scout:{ filter:'all', risk:'any', sort:'score' },
              inv:{ amount:1000, mode:'signals', scope:'coin', period:'1M' } };
let win = { count:168, endOffset:0 };
let hoverI = null;
let _bt=null, _inv=null, _drag=null, _wt=null, _raf=null;
let priceC=null, compC=null, rsiC=null, curvC=null, eqC=null, invC=null, tipEl=null, _wheelH=null;

// ---------- helpers ----------
function coin(s){ return DATA.coins[s]; }
function clip(x){ return x<-1?-1:x>1?1:x; }
function col(name,fb){ try{ const v=getComputedStyle(ROOT).getPropertyValue(name).trim(); return v||fb; }catch(e){ return fb; } }
function fmtPrice(v){ if(v==null) return '—'; if(v>=1000) return v.toLocaleString('en-US',{maximumFractionDigits:0}); if(v>=100) return v.toFixed(2); if(v>=1) return v.toFixed(3); return v.toPrecision(4); }
function sgn(v,d){ if(v==null||!isFinite(v)) return '—'; return (v>=0?'+':'')+v.toFixed(d); }
function flagColor(f){ return (f==='STRONG BUY'||f==='BUY')?'var(--bull)':(f==='STRONG SELL'||f==='SELL')?'var(--bear)':'var(--dim)'; }
function scoreColor(v){ return v>=THRESH.buy?'var(--bull)':v<=THRESH.sell?'var(--bear)':'var(--dim)'; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function scoreBarHTML(v,h){ const half=Math.max(-100,Math.min(100,v))/2; const left=v>=0?50:50+half; const w=Math.abs(half);
  return '<div style="position:relative;height:'+(h||8)+'px;background:var(--line);width:100%">'
    +'<div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--dim);opacity:.55"></div>'
    +'<div style="position:absolute;top:0;bottom:0;left:'+left+'%;width:'+w+'%;background:'+(v>=0?'var(--bull)':'var(--bear)')+'"></div></div>'; }
function voteBarHTML(v){ const half=Math.max(-1,Math.min(1,v))*50; const left=v>=0?50:50+half; const w=Math.abs(half);
  return '<div style="position:relative;height:6px;background:var(--line);width:100%">'
    +'<div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--dim);opacity:.55"></div>'
    +'<div style="position:absolute;top:0;bottom:0;left:'+left+'%;width:'+w+'%;background:'+(v>=0?'var(--bull)':'var(--bear)')+'"></div></div>'; }
function confBarHTML(p){ return '<div style="position:relative;height:6px;background:var(--line);width:100%"><div style="position:absolute;top:0;bottom:0;left:0;width:'+Math.max(0,Math.min(100,p))+'%;background:var(--ink);opacity:.85"></div></div>'; }
function flagHTML(f){ const c=flagColor(f); return '<span style="display:inline-flex;align-items:center;gap:7px"><span style="width:9px;height:9px;background:'+c+';flex:none"></span><span style="font-size:12px;font-weight:600;letter-spacing:.06em;color:'+c+'">'+f+'</span></span>'; }
function colSpan(text,color,size,weight){ return '<span style="color:'+color+';font-size:'+(size||14)+'px;font-weight:'+(weight||600)+'">'+text+'</span>'; }
function fmtMoney(v){ if(v==null||!isFinite(v)) return '—'; const a=Math.abs(v); const opts=a>=1000?{maximumFractionDigits:0}:{minimumFractionDigits:2,maximumFractionDigits:2}; return (v<0?'−$':'$')+a.toLocaleString('en-US',opts); }
function sgnMoney(v){ if(v==null||!isFinite(v)) return '—'; return (v>=0?'+':'−')+'$'+Math.abs(v).toLocaleString('en-US',Math.abs(v)>=1000?{maximumFractionDigits:0}:{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ---------- beginner mode ----------
// Every section can carry a plain-English strip. Toggled by SIMPLE MODE in the
// header — on by default, because the page should make sense with zero
// investing background.
function explain(html){ if(!state.simple) return '';
  return '<div style="display:flex;gap:12px;align-items:flex-start;margin:4px 0 20px;padding:13px 16px;border:1px dashed var(--line);background:var(--panel);font-size:13px;line-height:1.65;color:var(--ink);opacity:.93">'
    +'<span style="flex:none;width:19px;height:19px;border:1px solid var(--accent);color:var(--accent);display:grid;place-items:center;font-size:11px;font-weight:700;margin-top:1px">i</span>'
    +'<span>'+html+'</span></div>'; }
function markSimpleBtn(){ const b=document.getElementById('simpleBtn'); if(!b) return;
  b.style.borderColor=state.simple?'var(--accent)':'var(--line)'; b.style.color=state.simple?'var(--ink)':'var(--dim)';
  b.textContent='SIMPLE MODE '+(state.simple?'ON':'OFF'); }

// ---------- backtest (client-side, driven by real comp/price) ----------
function backtest(co, p, startIdx){
  const c=co.c, comp=co.comp, t=co.t, n=c.length;
  let start=0; while(start<n && !isFinite(comp[start])) start++; start=Math.max(start, 60, startIdx||0);
  const fee=p.fee/100;
  const pos=new Array(n).fill(0); const reason=new Array(n).fill('');
  let cur=0, entryPrice=0;
  for(let i=start+1;i<n;i++){ let next=cur; const sig=comp[i-1];
    if(cur===0){ if(isFinite(sig)&&sig>=p.entry){ next=1; entryPrice=c[i]; } }
    else { const dd=(c[i-1]-entryPrice)/entryPrice*100; if(p.stop>0&&dd<=-p.stop){ next=0; reason[i]='stop'; } else if(isFinite(sig)&&sig<=p.exit){ next=0; reason[i]='signal'; } }
    pos[i]=next; cur=next; }
  let eq=1, feeUnits=0; const eqArr=[],holdArr=[],rets=[],feeArr=[]; const base=c[start]; const trades=[]; let tEntry=null;
  for(let i=start;i<n;i++){ let r=1;
    if(i>start){ r=c[i]/c[i-1]; if(pos[i]===1) eq*=r; }
    if(i>start&&pos[i]!==pos[i-1]){ feeUnits+=eq*fee; eq*=(1-fee); if(pos[i]===1){ tEntry={idx:i,price:c[i]}; } else if(tEntry){ trades.push({entryIdx:tEntry.idx,exitIdx:i,price:tEntry.price,exitPrice:c[i],ret:(c[i]/tEntry.price-1)*100-fee*200,reason:reason[i]||'signal'}); tEntry=null; } }
    rets.push(pos[i]===1?(i>start?c[i]/c[i-1]-1:0):0); eqArr.push(eq); holdArr.push(c[i]/base); feeArr.push(feeUnits); }
  if(tEntry){ const i=n-1; trades.push({entryIdx:tEntry.idx,exitIdx:i,price:tEntry.price,exitPrice:c[i],ret:(c[i]/tEntry.price-1)*100-fee*100,reason:'open'}); }
  const last=eqArr[eqArr.length-1]||1, holdLast=holdArr[holdArr.length-1]||1;
  const maxDD=(a)=>{ let pk=a[0]||1,dd=0; for(const x of a){ if(x>pk)pk=x; const d=(x-pk)/pk; if(d<dd)dd=d; } return dd*100; };
  const bars=eqArr.length, perYear=24*365;
  const mean=(a)=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
  const std=(a)=>{ if(a.length<2)return 0; const m=mean(a); return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/a.length); };
  const sharpe=(a)=>{ const s=std(a); return s>1e-9?mean(a)/s*Math.sqrt(perYear):0; };
  const sortino=(a)=>{ const dn=a.filter(x=>x<0); const s=std(dn); return s>1e-9?mean(a)/s*Math.sqrt(perYear):0; };
  const holdRets=[]; for(let i=1;i<holdArr.length;i++) holdRets.push(holdArr[i]/holdArr[i-1]-1);
  const wins=trades.filter(t=>t.ret>0), losses=trades.filter(t=>t.ret<=0);
  const grossW=wins.reduce((a,b)=>a+b.ret,0), grossL=Math.abs(losses.reduce((a,b)=>a+b.ret,0));
  const exposure=bars?pos.slice(start).filter(x=>x===1).length/bars*100:0;
  const cagr=(Math.pow(last,perYear/Math.max(1,bars))-1)*100;
  return { start, eqArr, holdArr, feeArr, t:t.slice(start), trades, feeUnits, m:{
    total:(last-1)*100, hold:(holdLast-1)*100, excess:(last-holdLast)*100,
    maxDD:maxDD(eqArr), holdDD:maxDD(holdArr), sharpe:sharpe(rets), holdSharpe:sharpe(holdRets),
    sortino:sortino(rets), cagr, exposure, winRate:trades.length?wins.length/trades.length*100:0,
    profitFactor:grossL>1e-9?grossW/grossL:(grossW>0?Infinity:0), numTrades:trades.length,
    avgTrade:trades.length?mean(trades.map(t=>t.ret)):0 } };
}

// ---------- canvas ----------
function prep(cv){ if(!cv) return null; const dpr=window.devicePixelRatio||1; const r=cv.getBoundingClientRect(); if(!r.width||!r.height) return null; cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr); const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,r.width,r.height); return {ctx,w:r.width,h:r.height}; }
function yscale(min,max,top,h){ const pad=(max-min)*0.08||1; const lo=min-pad, hi=max+pad; return (val)=>top+(1-(val-lo)/(hi-lo))*h; }
function winRange(co){ const n=co.c.length; let count=Math.max(30,Math.min(n,Math.round(win.count))); let end=n-1-Math.round(win.endOffset); end=Math.max(count-1,Math.min(n-1,end)); const start=end-count+1; return {n,start,end,count}; }
// How many projected (future) bar slots to reserve on the right of the price
// chart. Only when the view is pinned to "now" — panning into the past hides
// the cone, because a projection only exists from the latest bar.
function fext(co,wr){ const f=co.forecast; if(!f||!f.bands||wr.end!==wr.n-1) return 0;
  return Math.min(f.bands.p50.length, Math.max(8, Math.round(wr.count*0.28))); }

function drawPrice(){ const P=prep(priceC); if(!P) return; const {ctx,w,h}=P; const co=coin(state.selected); const wr=winRange(co); const s=wr.start,e2=wr.end,N=wr.count;
  const idx=[]; for(let i=s;i<=e2;i++) idx.push(i);
  const lo=co.l,hi=co.h,op=co.o,cl=co.c,bbU=co.bbUp,bbL=co.bbLo,eF=co.emaF,eS=co.emaS;
  const FE=fext(co,wr); const fb=FE>0?co.forecast.bands:null;
  let mn=Infinity,mx=-Infinity; idx.forEach(i=>{ mn=Math.min(mn,lo[i],isFinite(bbL[i])?bbL[i]:lo[i]); mx=Math.max(mx,hi[i],isFinite(bbU[i])?bbU[i]:hi[i]); });
  if(fb){ for(let j=0;j<FE;j++){ mn=Math.min(mn,fb.p10[j]); mx=Math.max(mx,fb.p90[j]); } }
  const pad=14,top=8,ch=h-26; const x=(i)=>pad+(i-s)/(N-1+FE)*(w-pad*2); const Y=yscale(mn,mx,top,ch);
  const ink=col('--ink','#f2f0ea'),dim=col('--dim','#86857f'),accent=col('--accent','#ff453a'),bull=col('--bull','#34c759'),bear=col('--bear','#ff453a');
  ctx.beginPath(); idx.forEach((i,k)=>{ if(!isFinite(bbU[i]))return; const xx=x(i),yy=Y(bbU[i]); k===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy); });
  for(let k=idx.length-1;k>=0;k--){ const i=idx[k]; if(!isFinite(bbL[i]))continue; ctx.lineTo(x(i),Y(bbL[i])); }
  ctx.closePath(); ctx.fillStyle=dim; ctx.globalAlpha=0.06; ctx.fill(); ctx.globalAlpha=1;
  const candleW=Math.max(1.5,(w-pad*2)/N*0.6);
  idx.forEach(i=>{ const xx=x(i); const up=cl[i]>=op[i]; ctx.strokeStyle=up?ink:dim; ctx.fillStyle=up?ink:dim; ctx.globalAlpha=up?0.9:0.55;
    ctx.beginPath(); ctx.moveTo(xx,Y(hi[i])); ctx.lineTo(xx,Y(lo[i])); ctx.lineWidth=1; ctx.stroke();
    const y1=Y(op[i]),y2=Y(cl[i]); ctx.fillRect(xx-candleW/2,Math.min(y1,y2),candleW,Math.max(1,Math.abs(y2-y1))); });
  ctx.globalAlpha=1;
  const drawLine=(arr,color,lw)=>{ ctx.beginPath(); let st=false; idx.forEach(i=>{ if(!isFinite(arr[i]))return; const xx=x(i),yy=Y(arr[i]); if(!st){ctx.moveTo(xx,yy);st=true;}else ctx.lineTo(xx,yy); }); ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.stroke(); };
  drawLine(eF,accent,1.3); drawLine(eS,dim,1.1);
  // ---- the outlook cone: where price went after similar past moments ----
  if(fb){ const bx=(j)=>pad+(N-1+j)/(N-1+FE)*(w-pad*2); const y0=Y(cl[e2]);
    const poly=(loA,hiA,alpha)=>{ ctx.beginPath(); ctx.moveTo(bx(0),y0);
      for(let j=1;j<=FE;j++) ctx.lineTo(bx(j),Y(hiA[j-1]));
      for(let j=FE;j>=1;j--) ctx.lineTo(bx(j),Y(loA[j-1]));
      ctx.closePath(); ctx.fillStyle=accent; ctx.globalAlpha=alpha; ctx.fill(); ctx.globalAlpha=1; };
    poly(fb.p10,fb.p90,0.055); poly(fb.p25,fb.p75,0.10);
    ctx.beginPath(); ctx.moveTo(bx(0),y0); for(let j=1;j<=FE;j++) ctx.lineTo(bx(j),Y(fb.p50[j-1]));
    ctx.strokeStyle=accent; ctx.lineWidth=1.6; ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
    // NOW divider between what happened and what could happen
    ctx.strokeStyle=dim; ctx.globalAlpha=.8; ctx.setLineDash([2,3]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx(0),top); ctx.lineTo(bx(0),top+ch); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    ctx.fillStyle=dim; ctx.font='600 9px Hanken Grotesk, sans-serif'; ctx.textBaseline='top';
    ctx.textAlign='left'; ctx.fillText('NOW',bx(0)+5,top);
    ctx.textAlign='center'; ctx.fillText('IF HISTORY RHYMES',(bx(0)+bx(FE))/2,top);
    // % labels on the cone's right edge, pushed apart so a tight band stays legible
    const G=10;
    let y50=Y(fb.p50[FE-1]), y90=Y(fb.p90[FE-1]), y10=Y(fb.p10[FE-1]);
    y90=Math.min(y90,y50-G); y10=Math.max(y10,y50+G);
    const clampY=(v)=>Math.max(top+5,Math.min(top+ch-5,v));
    const pct=(arr)=>sgn((arr[FE-1]/cl[e2]-1)*100,1)+'%';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillStyle=dim; ctx.font='9px Hanken Grotesk, sans-serif';
    ctx.fillText(pct(fb.p90),w-pad,clampY(y90)); ctx.fillText(pct(fb.p10),w-pad,clampY(y10));
    ctx.fillStyle=accent; ctx.font='600 9.5px Hanken Grotesk, sans-serif';
    ctx.fillText(pct(fb.p50),w-pad,clampY(y50));
    ctx.textBaseline='alphabetic'; }
  // Directional calls, marked by hindsight outcome: ring = played out right,
  // ✕ = wrong, faint triangle = too recent to score.
  idx.forEach(i=>{ const cl2=co.call?co.call[i]:null; if(!cl2) return; const oc=co.outcome[i]; const isBuy=cl2==='buy'; const xx=x(i); const baseY=isBuy?Y(lo[i])+9:Y(hi[i])-9;
    const isConf=!!(co.confCall&&co.confCall[i]);
    ctx.globalAlpha = (oc===0?0.4:1)*(isConf?1:0.45); ctx.fillStyle = oc===1?(isBuy?bull:bear):dim;

function wireInvest(){

  // and keep the box from blurring mid-press (a blur re-render would destroy
  // the pressed chip before its click event can fire).
  const commitAmt=()=>{ const a=document.getElementById('invAmt'); if(a){ const v=parseFloat(a.value); if(isFinite(v)&&v>0) state.inv.amount=v; } };
  const amt=document.getElementById('invAmt'); if(amt){ amt.addEventListener('change',()=>{ commitAmt(); render(); }); }
  const wire=(sel,fn)=>MAIN.querySelectorAll(sel).forEach(el=>{ el.addEventListener('pointerdown',e=>e.preventDefault()); el.addEventListener('click',()=>{ commitAmt(); fn(el); render(); }); });
  wire('[data-amt]',el=>{ state.inv.amount=parseFloat(el.getAttribute('data-amt')); });
  wire('[data-mode]',el=>{ state.inv.mode=el.getAttribute('data-mode'); });
  wire('[data-scope]',el=>{ state.inv.scope=el.getAttribute('data-scope'); });
  wire('[data-period]',el=>{ state.inv.period=el.getAttribute('data-period'); });
  wire('[data-chip]',el=>{ state.selected=el.getAttribute('data-chip'); });
}

    +'<div style="font-size:14.5px;color:var(--dim);max-width:620px;margin-top:14px;line-height:1.55">The same 7 rules as the scanner, swept across <span style="color:var(--ink)">every liquid USDT pair on Binance</span> — most-traded first — so the strongest setups anywhere on the exchange surface here, not just on your watchlist.</div></div>'
    +(sc?'<div style="text-align:right;flex:none"><div style="font-size:10px;letter-spacing:.18em;color:var(--dim)">LAST SWEEP</div><div style="font-size:13px;margin-top:6px">'+esc(sc.asOf||'—')+'</div><div style="font-size:10.5px;color:var(--dim);margin-top:4px">'+sc.scored+' of '+sc.eligible+' pairs scored · '+sc.exchangePairs+' on exchange</div></div>':'')+'</div>';
  h+='<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;padding:14px 18px;border:1px solid var(--warn);background:var(--panel)"><div style="width:4px;align-self:stretch;background:var(--warn);flex:none"></div><div style="font-size:12.5px;color:var(--ink);line-height:1.55;opacity:.94"><b style="color:var(--warn);letter-spacing:.08em">A PLACE TO START READING — NOT A BUY LIST.</b> These rows are where the engine’s rules score highest right now. The same rules are regularly wrong, strong-looking setups fail all the time, and the smaller the coin the harder it fails. Read the risk tag before the rank. Not financial advice.</div></div>';
  if(!sc){ h+=(DATA.scoutMin>0
      ?'<div style="padding:26px;border:1px solid var(--line);background:var(--panel);font-size:13px;color:var(--dim);line-height:1.7">The first background sweep is running (every '+DATA.scoutMin+' min) — reload this page in a minute or two.</div>'
      :'<div style="padding:26px;border:1px solid var(--line);background:var(--panel);font-size:13px;color:var(--dim);line-height:1.7">No sweep stored yet. Run <span style="color:var(--ink);font-family:monospace">python -m crypto_tool.cli scout</span> once (about a minute), then rebuild or reload this page — or serve with <span style="color:var(--ink);font-family:monospace">--scout-min 60</span> to keep it fresh automatically.</div>')+'</section>'; MAIN.innerHTML=h; return; }
  // Column label follows the data: the outlook checkpoint is measured in bars,
  // not literally "24h" (a 12-bar fallback exists on short histories).
  const oh=((sc.rows||[]).map(r=>r.outlook&&r.outlook.hours).find(v=>v!=null));
  const olLabel=oh!=null?('OUTLOOK +'+Math.round(oh)+'H'):'OUTLOOK';
  h+=explain('The scanner watches the '+DATA.markets+' coins you track; the scout looks at the whole exchange. Every liquid coin gets the same score from −100 to +100, plus: <b>'+olLabel+'</b> — in past moments that looked like this coin’s right-now, how often price was higher that far ahead (a tally of the past, not a prediction); <b>RECORD</b> — how often this coin’s own buy/sell calls played out in hindsight over the swept window. Click any row to open the full chart, cone and reasoning for that coin.');
  const ageH=(Date.now()-(sc.asOfMs||0))/3600000;
  const staleThresh=Math.max(2,((DATA.scoutMin||0)/60)*2);
  if(sc.asOfMs&&ageH>staleThresh){ h+='<div style="font-size:12px;color:var(--dim);margin-bottom:14px">This sweep is '+(ageH<48?Math.round(ageH)+' hours':Math.round(ageH/24)+' days')+' old — markets have moved since. '+(DATA.scoutMin>0?'Reload this page for the latest sweep (background sweeps run every '+DATA.scoutMin+' min).':'Re-run <span style="color:var(--ink);font-family:monospace">python -m crypto_tool.cli scout</span> (or serve with <span style="color:var(--ink);font-family:monospace">--scout-min 60</span>) for a fresh read.')+'</div>'; }
  const chip=(attr,val,on,label)=>'<button '+attr+'="'+val+'" style="background:none;border:1px solid '+(on?'var(--accent)':'var(--line)')+';color:'+(on?'var(--ink)':'var(--dim)')+';font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.12em;padding:6px 12px;cursor:pointer">'+label+'</button>';
  h+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">'
    +chip('data-sfilter','all',st.filter==='all','ALL SIGNALS')+chip('data-sfilter','buys',st.filter==='buys','BUY SIGNALS ONLY')
    +'<span style="width:10px"></span>'
    +chip('data-srisk','any',st.risk==='any','ANY RISK')+chip('data-srisk','noextreme',st.risk==='noextreme','HIDE EXTREME RISK')
    +'<span style="margin-left:auto;display:flex;gap:8px;align-items:center"><span style="font-size:10px;letter-spacing:.14em;color:var(--dim)">SORT</span>'
    +SSORTS.map(p=>chip('data-ssort',p[0],st.sort===p[0],p[1])).join('')+'</span></div>';
  const rows=scoutRows();
  h+='<div style="position:relative;border:1px solid var(--line);background:var(--panel)">'+bracket();
  h+='<div style="'+SGRID+';padding:12px 20px;border-bottom:1px solid var(--line);font-size:10px;font-weight:500;letter-spacing:.14em;color:var(--dim)"><div>#</div><div>MARKET</div><div>PRICE</div><div>24H</div><div>SIGNAL SCORE</div><div>CONF</div><div title="share of past moments that looked like this coin’s right-now where price was higher this far ahead — a past tally, not a prediction">'+olLabel+'</div><div title="how this coin’s own buy/sell calls graded in hindsight over the swept window">RECORD</div><div>RISK</div></div>';
  if(!(sc.rows||[]).length){ h+='<div style="padding:22px;font-size:13px;color:var(--dim)">This sweep scored no pairs ('+(sc.errors||0)+' errors of '+(sc.eligible||0)+' eligible) — the exchange may have been unreachable. Re-run <span style="color:var(--ink);font-family:monospace">python -m crypto_tool.cli scout</span>.</div>'; }
  else if(!rows.length){ h+='<div style="padding:22px;font-size:13px;color:var(--dim)">Nothing matches these filters right now — which is an honest answer. Loosen a filter, or come back after the next sweep.</div>'; }
  rows.forEach((r,i)=>{ const tag=r.tracked?'<span title="on your watchlist" style="color:var(--accent);font-size:11px"> ★</span>':'';
    let ol='<span style="color:var(--dim)">—</span>';
    if(r.outlook){ const q=r.outlook.quality; const qc=q==='HIGH'?'var(--ink)':q==='MEDIUM'?'var(--warn)':'var(--dim)';
      ol='<span style="color:'+(r.outlook.probUp>=60?'var(--bull)':r.outlook.probUp<=40?'var(--bear)':'var(--ink)')+'">'+r.outlook.probUp.toFixed(0)+'%</span> <span style="color:var(--dim)">higher · '+sgn(r.outlook.median,1)+'%</span> <span title="comparison quality" style="color:'+qc+';font-size:9px;letter-spacing:.08em">'+q[0]+'</span>'; }
    let rec='<span style="color:var(--dim)">—</span>';
    if(r.record&&r.record.accuracy!=null){ const a=r.record.accuracy; rec='<span style="color:'+(a>=50?'var(--bull)':'var(--bear)')+'">'+a.toFixed(0)+'%</span> <span style="color:var(--dim)">('+r.record.hits+'/'+(r.record.hits+r.record.misses)+')</span>'; }
    if(r.record&&r.record.confAccuracy!=null){ const ch=r.record.confHits||0, cn=ch+(r.record.confMisses||0); rec+='<div style="font-size:10px;color:var(--dim);margin-top:2px">confident: '+r.record.confAccuracy.toFixed(0)+'% ('+ch+'/'+cn+')</div>'; }
    h+='<div class="row-hover" data-scoin="'+esc(r.symbol)+'" style="cursor:pointer;'+SGRID+';padding:13px 20px;border-bottom:1px solid var(--line)">'
      +'<div style="font-size:12px;color:var(--dim)">'+String(i+1).padStart(2,'0')+'</div>'
      +'<div><div style="font-size:15px;font-weight:600;letter-spacing:-.01em">'+esc(r.symbol)+tag+'</div><div style="font-size:11px;color:var(--dim);margin-top:1px">'+esc(r.name||'')+'</div></div>'
      +'<div style="font-size:13px">'+fmtPrice(r.price)+'</div>'
      +'<div style="font-size:12.5px">'+pctCell(r.p24h)+'</div>'
      +'<div><div style="display:flex;align-items:center;gap:10px"><div style="flex:1">'+scoreBarHTML(r.composite,7)+'</div><div style="width:36px;text-align:right">'+colSpan(sgn(r.composite,0),scoreColor(r.composite),13,600)+'</div></div><div style="margin-top:4px;font-size:9.5px;font-weight:600;letter-spacing:.08em;color:'+flagColor(r.flag)+'">'+esc(r.flag)+'</div></div>'
      +'<div style="font-size:12.5px;color:var(--dim)">'+r.confidence.toFixed(0)+'%</div>'
      +'<div style="font-size:11.5px">'+ol+'</div>'
      +'<div style="font-size:11.5px">'+rec+'</div>'
      +'<div><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.04em;color:'+riskColor(r.risk)+'"><span style="width:8px;height:8px;background:'+riskColor(r.risk)+';flex:none"></span>'+esc(r.risk)+'</span><div style="font-size:10px;color:var(--dim);margin-top:2px;line-height:1.3">'+esc((r.riskFlags||[]).slice(0,1).join(''))+'</div></div>'
      +'</div>'; });
  h+='</div>';
  h+='<div style="display:flex;gap:24px;margin-top:14px;font-size:11px;color:var(--dim);letter-spacing:.03em;flex-wrap:wrap"><span><span style="color:var(--accent)">★</span> already on your watchlist</span><span>OUTLOOK = tally of look-alike past moments · RECORD = hindsight grade — neither predicts anything</span><span>OUTLOOK letter = comparison quality (H/M/L) — short sweep history makes most of these L or M</span><span style="margin-left:auto">Click any row for full charts, cone &amp; reasoning</span></div></section>';
  MAIN.innerHTML=h;
  MAIN.querySelectorAll('[data-sfilter]').forEach(el=>el.addEventListener('click',()=>{ state.scout.filter=el.getAttribute('data-sfilter'); render(); }));
  MAIN.querySelectorAll('[data-srisk]').forEach(el=>el.addEventListener('click',()=>{ state.scout.risk=el.getAttribute('data-srisk'); render(); }));
  MAIN.querySelectorAll('[data-ssort]').forEach(el=>el.addEventListener('click',()=>{ state.scout.sort=el.getAttribute('data-ssort'); render(); }));
  MAIN.querySelectorAll('[data-scoin]').forEach(el=>el.addEventListener('click',()=>{ openCoin(el.getAttribute('data-scoin')); }));
}

// ---------- discover ----------
function fmtBig(v){ if(v==null) return '—'; const a=Math.abs(v); if(a>=1e9) return '$'+(v/1e9).toFixed(1)+'B'; if(a>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(a>=1e3) return '$'+(v/1e3).toFixed(0)+'K'; return '$'+v.toFixed(0); }
function pctCell(v){ if(v==null) return '<span style="color:var(--dim)">—</span>'; return '<span style="color:'+(v>=0?'var(--bull)':'var(--bear)')+'">'+sgn(v,1)+'%</span>'; }
function riskColor(t){ return t==='EXTREME'?'var(--bear)':t==='HIGH'?'var(--accent)':'var(--dim)'; }
const DSORT=[['momentum','MOMENTUM'],['gainers','24H GAINERS'],['volume','VOLUME SURGE']];
const DGRID='display:grid;grid-template-columns:34px 1.25fr 0.95fr 0.55fr 0.6fr 0.6fr 0.7fr 0.85fr 1.5fr;align-items:center;gap:12px';
function discoverSorted(){ const rows=(DATA.discover&&DATA.discover.rows)||[]; const k=state.discoverSort;
  const key=k==='gainers'?(r=>r.p24h==null?-1e9:r.p24h):k==='volume'?(r=>r.turnover||0):(r=>r.momentum==null?-1e9:r.momentum);
  return rows.slice().sort((a,b)=>key(b)-key(a)); }
let openSeq=0;   // invalidates in-flight deep-dive fetches once the user navigates on
function openCoin(sym){ if(!sym) return; if(DATA.coins[sym]){ state.selected=sym; setView('detail'); return; }
  const tok=++openSeq;
  showDeepLoading(sym);
  fetch('/api/coin?symbol='+encodeURIComponent(sym)).then(function(r){return r.json();}).then(function(j){
    if(tok!==openSeq) return;
    if(j&&j.ok&&j.coin){ DATA.coins[sym]=j.coin; if(DATA.names.indexOf(sym)<0) DATA.names.push(sym); state.selected=sym; setView('detail'); }
    else { deepError(sym,(j&&j.error)||'no candle data available'); }
  }).catch(function(){ if(tok!==openSeq) return; deepError(sym,'live deep-dive needs the served app — run:  python -m crypto_tool.cli web --serve'); }); }
function showDeepLoading(sym){ MAIN.innerHTML='<section><div style="padding:90px 0;text-align:center;color:var(--dim)"><div style="font-size:13px;letter-spacing:.18em">FETCHING '+esc(sym)+' FROM BINANCE …</div><div style="margin-top:12px;font-size:11px;letter-spacing:.06em">running the full signal engine + hindsight scorecard</div></div></section>'; }
function deepError(sym,msg){ MAIN.innerHTML='<section><div style="padding:70px 0;text-align:center"><div style="font-size:14px;color:var(--bear);letter-spacing:.04em">Could not open '+esc(sym)+'</div><div style="margin-top:10px;font-size:12px;color:var(--dim);max-width:480px;margin:10px auto 0;line-height:1.5">'+esc(msg)+'</div><div style="margin-top:20px"><button id="backBtn" style="background:none;border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:11px;letter-spacing:.14em;padding:8px 16px;cursor:pointer">← BACK</button></div></div></section>'; const b=document.getElementById('backBtn'); if(b) b.addEventListener('click',function(){ setView(state.view); }); }
function renderDiscover(){ const disc=DATA.discover||{rows:[],error:'no data',count:0};
  let h='<section><div style="font-size:10px;font-weight:500;letter-spacing:.2em;color:var(--dim);margin-bottom:16px">06 — DISCOVER · MARKET MOVERS (HIGH RISK)</div>';
  h+='<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:18px"><div>'
    +'<div style="font-size:42px;font-weight:500;letter-spacing:-.035em;line-height:.9">The movers.</div>'
    +'<div style="font-size:14.5px;color:var(--dim);max-width:600px;margin-top:14px;line-height:1.55">Scanned the top '+(disc.count||0)+' coins by market cap across the whole market (via CoinGecko). These are what is moving right now — which is also the riskiest end of crypto.</div></div>'
    +'<div style="text-align:right;flex:none"><div style="font-size:10px;letter-spacing:.18em;color:var(--dim)">AS OF</div><div style="font-size:13px;margin-top:6px">'+(disc.asOf||'—')+'</div></div></div>';
  h+='<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:22px;padding:14px 18px;border:1px solid var(--bear);background:var(--panel)"><div style="width:4px;align-self:stretch;background:var(--bear);flex:none"></div><div style="font-size:12.5px;color:var(--ink);line-height:1.55;opacity:.94"><b style="color:var(--bear);letter-spacing:.08em">SPECULATION — READ THIS.</b> Movers are the most dangerous coins in the market: most low-caps are pump-and-dumps or trend to zero. There are no gems perfect for quick flips here — only bets with risk flags attached. Nothing below is a buy signal. Not financial advice.</div></div>';
  h+=explain('This tab looks beyond your tracked list at what is moving across the whole market right now. Fast movers make headlines, but with small coins a big green number usually means big risk, not free money — that is why every row carries a risk tag and warning flags instead of a recommendation.');
  if(disc.error){ h+='<div style="font-size:13px;color:var(--dim);padding:20px 0">Could not reach the market database ('+esc(disc.error)+'). It may be rate-limited — try again shortly.</div></section>'; MAIN.innerHTML=h; return; }
  h+='<div style="display:flex;gap:8px;margin-bottom:14px">'+DSORT.map(function(p){ return '<button data-dsort="'+p[0]+'" style="background:none;border:1px solid '+(state.discoverSort===p[0]?'var(--accent)':'var(--line)')+';color:'+(state.discoverSort===p[0]?'var(--ink)':'var(--dim)')+';font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.14em;padding:6px 13px;cursor:pointer">'+p[1]+'</button>'; }).join('')+'</div>';
  h+='<div style="position:relative;border:1px solid var(--line);background:var(--panel)">'+bracket();
  h+='<div style="'+DGRID+';padding:12px 20px;border-bottom:1px solid var(--line);font-size:10px;font-weight:500;letter-spacing:.14em;color:var(--dim)"><div>#</div><div>COIN</div><div>PRICE</div><div>1H</div><div>24H</div><div>7D</div><div>MCAP</div><div>RISK</div><div>FLAGS</div></div>';
  discoverSorted().forEach(function(r,i){ const tag=r.deepDive?'<span title="full signal engine available" style="color:var(--accent);font-size:11px"> ★</span>':(r.onBinance?'<span title="on Binance" style="color:var(--dim);font-size:10px"> ·B</span>':'');
    h+='<div '+(r.deepDive?'data-dcoin="'+r.binanceSymbol+'" class="row-hover" style="cursor:pointer;':'style="')+DGRID+';padding:13px 20px;border-bottom:1px solid var(--line)">'
      +'<div style="font-size:12px;color:var(--dim)">'+String(i+1).padStart(2,'0')+'</div>'
      +'<div><div style="font-size:15px;font-weight:600;letter-spacing:-.01em">'+esc(r.symbol)+tag+'</div><div style="font-size:11px;color:var(--dim);margin-top:1px">'+esc(r.name||'')+'</div></div>'
      +'<div style="font-size:13px">'+fmtPrice(r.price)+'</div>'
      +'<div style="font-size:12.5px">'+pctCell(r.p1h)+'</div>'
      +'<div style="font-size:12.5px">'+pctCell(r.p24h)+'</div>'
      +'<div style="font-size:12.5px">'+pctCell(r.p7d)+'</div>'
      +'<div style="font-size:12.5px;color:var(--dim)">'+fmtBig(r.mcap)+'</div>'
      +'<div><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.04em;color:'+riskColor(r.risk)+'"><span style="width:8px;height:8px;background:'+riskColor(r.risk)+';flex:none"></span>'+r.risk+'</span></div>'
      +'<div style="font-size:11px;color:var(--dim);line-height:1.35">'+esc((r.flags||[]).slice(0,2).join(' · '))+'</div></div>'; });
  h+='</div>';
  h+='<div style="display:flex;gap:24px;margin-top:14px;font-size:11px;color:var(--dim);letter-spacing:.03em;flex-wrap:wrap"><span><span style="color:var(--accent)">★</span> on Binance — click any starred row for full charts + signals</span><span style="margin-left:auto">Risk = market-cap tier + liquidity + volatility + exchange listing</span></div></section>';
  MAIN.innerHTML=h;
  MAIN.querySelectorAll('[data-dsort]').forEach(function(el){ el.addEventListener('click',function(){ state.discoverSort=el.getAttribute('data-dsort'); render(); }); });
  MAIN.querySelectorAll('[data-dcoin]').forEach(function(el){ el.addEventListener('click',function(){ openCoin(el.getAttribute('data-dcoin')); }); });
}

// ---------- shell / nav / theme ----------
function setView(v){ openSeq++; state.view=v; hoverI=null; render(); }
function markNav(){ document.querySelectorAll('[data-view]').forEach(b=>{ const on=b.getAttribute('data-view')===state.view; b.querySelector('.ind').style.opacity=on?'1':'0'; }); }
function mountNav(){ const items=[['scanner','SCANNER'],['detail','COIN DETAIL'],['invest','TEST MONEY'],['backtest','BACKTEST'],['scout','SCOUT'],['discover','DISCOVER']];
  NAV.innerHTML=items.map(([v,l])=>'<button data-view="'+v+'" style="position:relative;background:none;border:none;color:var(--ink);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.18em;padding:8px 16px;cursor:pointer">'+l+'<div class="ind" style="position:absolute;left:8px;right:8px;bottom:-2px;height:2px;background:var(--accent);opacity:0"></div></button>').join('');
  NAV.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>setView(b.getAttribute('data-view'))));
}
function mountThemes(){ const sw=document.getElementById('themeSwitch'); const swatch={carbon:'#ff453a',bone:'#aa3a1f',blueprint:'#0a84ff',oxide:'#ff9f0a'};
  sw.innerHTML=THEMES.map(t=>'<button data-theme-btn="'+t+'" title="'+t+'" style="width:14px;height:14px;border-radius:50%;border:1px solid var(--line);background:'+swatch[t]+';cursor:pointer;padding:0;outline:'+(state.theme===t?'2px solid var(--ink)':'none')+';outline-offset:1px"></button>').join('');
  sw.querySelectorAll('[data-theme-btn]').forEach(b=>b.addEventListener('click',()=>{ state.theme=b.getAttribute('data-theme-btn'); ROOT.dataset.theme=state.theme; mountThemes(); drawAll(); }));
}
function render(){ if(state.view==='scanner') renderScanner(); else if(state.view==='detail') renderDetail(); else if(state.view==='invest') renderInvest(); else if(state.view==='backtest') renderBacktest(); else if(state.view==='scout') renderScout(); else renderDiscover(); markNav(); }

function init(){ ROOT.dataset.theme=state.theme; document.getElementById('mktLine').textContent='BINANCE · '+DATA.interval.toUpperCase(); document.getElementById('mktCount').textContent=DATA.markets+' MARKETS';
  const sb=document.getElementById('simpleBtn'); if(sb){ sb.addEventListener('click',()=>{ state.simple=!state.simple; markSimpleBtn(); render(); }); markSimpleBtn(); }
  mountNav(); mountThemes(); render();
  let ro; try{ ro=new ResizeObserver(()=>drawAll()); ro.observe(ROOT); }catch(e){}
  window.addEventListener('resize',drawAll);
}
if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
