# =============================================================================
# Crypto Investment Analysis Tool — configuration
# Everything the tool does is driven from this file. No code edits needed to
# change coins, timeframes, indicator periods, signal weights or backtest rules.
# =============================================================================

data:
  # Binance public market-data hosts (no API key required for klines).
  # The client tries these in order; data-api.binance.vision is the public
  # data mirror that is reachable in some regions where the main host is not.
  base_urls:
    - https://api.binance.com
    - https://data-api.binance.vision
  # Your watchlist — the page shows exactly these. Add/remove any Binance USDT
  # pair here, then re-ingest. Unreachable symbols are skipped, not fatal.
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - AVAXUSDT
    - LINKUSDT
    - LTCUSDT
    - TRXUSDT
    - DOTUSDT
    - BCHUSDT
    - NEARUSDT
    - UNIUSDT
    - ATOMUSDT
    - ETCUSDT
    - XLMUSDT
    - FILUSDT
    - APTUSDT
    - ARBUSDT
    - OPUSDT
    - INJUSDT
    - SUIUSDT
  # Synchronize with the exchange: top the watchlist up to this many coins
  # using Binance's most-traded USDT pairs (stablecoins, leveraged tokens and
  # thin pairs filtered out — same rules as the scout). Your explicit list
  # above is always kept; auto-picked coins fill the rest. 0 = off.
  symbols_auto: 60
  interval: 1h            # 1m, 5m, 15m, 1h, 4h, 1d, 1w
  # Total candles per symbol. Values > 1000 page backwards through history to
  # assemble the widest window possible (5000 x 1h ~ 7 months; raise for more
  # regimes to learn from — fetch just takes a little longer).
  history_limit: 5000
  db_path: data/market.db
  request_timeout: 15

indicators:
  ema_fast: 12
  ema_slow: 26
  macd_signal: 9
  rsi_period: 14
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  sma_short: 50
  sma_long: 200
  roc_period: 10
  obv_smooth: 5
  vol_ma_period: 20
  curvature_smooth: 10    # EMA span used to smooth price before differentiating

signals:
  # Relative importance of each contributing rule. The composite score is a
  # weighted average of the per-rule votes (each in [-1, +1]), rescaled to
  # [-100, +100]. Tune these to express your strategy bias.
  weights:
    trend: 1.0            # trend-following  (EMA/SMA alignment)
    macd: 1.0            # trend-following  (MACD histogram + crossover)
    rsi: 0.8             # mean-reversion   (oversold = bullish)
    bollinger: 0.8       # mean-reversion   (below lower band = bullish)
    curvature: 1.2       # the headline feature: velocity + acceleration of price
    momentum: 0.7        # trend-following  (rate of change)
    volume: 0.5          # confirmation     (OBV slope)
  buy_threshold: 35
  strong_buy_threshold: 65
  sell_threshold: -35
  strong_sell_threshold: -65

backtest:
  fee_pct: 0.10           # taker fee per side, percent
  slippage_pct: 0.05      # assumed slippage per side, percent
  entry_score: 40         # go long when composite >= this
  exit_score: 0           # exit to cash when composite <= this
  stop_loss_pct: 8.0      # hard stop from entry (0 disables)
  take_profit_pct: 0.0    # take profit from entry (0 disables)

paper:
  # Fictional-money portfolio that allocates virtual capital across the coins
  # according to the signals, rebalanced each bar (long-only, next-bar fills).
  starting_cash: 10000
  fee_pct: 0.10
  min_score: 40           # only allocate to coins with composite >= this
  max_weight_per_coin: 0.34
  rebalance_band: 0.05    # skip a trade unless target vs current weight differs by > this
  learn:
    # "Learn from the money made or lost": tilt the signal weights toward the
    # rules whose recent votes best predicted realised returns. Walk-forward,
    # no look-ahead. A feedback loop — NOT a guarantee of improvement.
    window: 200           # trailing bars used to score each rule's profitability
    retrain_every: 50     # bars between weight updates
    lr: 0.25              # EMA step toward the freshly-scored target weights (0..1)
    min_obs: 100          # don't update weights on fewer live bars than this (thin sample)

scout:
  # Whole-exchange coin scout: one sweep runs the same 7-rule engine over every
  # liquid USDT pair on Binance (most-traded first) and keeps the strongest
  # setups. Run it with `python -m crypto_tool.cli scout`, or serve the web UI
  # with `--scout-min 60` to refresh it automatically in the background.
  bars: 400                   # candles fetched per pair (one request each)
  min_quote_volume_usd: 1000000   # skip pairs with less 24h turnover than this
  max_symbols: 300            # cap the sweep at the N most-traded pairs
  top: 60                     # strongest rows kept & shown
  pause_ms: 60                # politeness delay between requests

web:
  # Candles per coin embedded in the page. 720 x 1h = 30 days of charts; the
  # outlook cone and its calibration always use the FULL stored history, so a
  # smaller embed only trims the visible chart window, not forecast quality.
  history: 720

  # Track-record stability: a directional call only counts once the flag has
  # HELD for eval_persist bars (single-bar blips are noise, not calls), and
  # calls where confidence >= eval_conf_gate AND the trend regime agrees are
  # graded separately — the engine's own filter for calls that deserve weight.
  # eval_horizon_long adds a second, longer grading horizon (signal-to-noise
  # improves with time; 72 x 1h = 3 days).
  eval_persist: 2
  eval_conf_gate: 0.6
  eval_horizon_long: 72   # patient grading (3 days) — signal/noise improves with time
  eval_horizon_short: 6   # quick-flip grading (6 hours) — expect it to look worst here

  # The Outlook cone: "when this coin looked like it does right now, what
  # happened next?" — K-nearest-neighbour analogues over this coin's own past,
  # projected forward as quantile bands. A base rate, not a prediction.
  forecast:
    bars: 48              # how far forward the cone is drawn (48 x 1h = 2 days)
    # "Chance higher" + typical-miss stats at these steps ahead. The short 4h
    # checkpoint exists for quick flips — where the honest answer is usually
    # "near coin-flip, small typical move, wide error".
    checkpoints: [4, 12, 24, 48]
    min_candidates: 60    # refuse to draw a cone on thinner history than this
    k_frac: 0.08          # analogues used = this fraction of candidate bars ...
    k_min: 25             # ... clamped between k_min and k_max
    k_max: 150
    calib_samples: 60     # past bars replayed for the honesty (coverage) check

exits:
  # Exit-point analysis: where to take profit / cut losses on a held position.
  atr_mult_stop: 3.0      # trailing (chandelier) & ATR stop distance, in ATRs
  atr_mult_target: 6.0    # take-profit distance in ATRs (~2:1 reward:risk)
  lookback: 22            # bars for the chandelier high & swing low/high
  rsi_overbought: 70      # RSI above this flags 'consider trimming'
